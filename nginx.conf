# nginx configuration for Excel Verify Project
# Place this in C:/nginx/conf/nginx.conf or include it in the main config

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Upstream for Django backend
    upstream django_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen       80;
        server_name  localhost;

        # Frontend - Serve React build files
        location / {
            root   html/excel-verify;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # API - Proxy to Django backend
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeouts for large file uploads
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
            
            # Enable CORS if needed
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Media files - Proxy to Django for file downloads
        location /media/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static files - Serve Django static files
        location /static/ {
            alias C:/Users/User/OneDrive - Premier Sales Promotions/Desktop/My Collection/ExcelVerifyProject/backend/staticfiles/;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
